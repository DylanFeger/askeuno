# ===========================================
# Ask Euno - AWS App Runner Configuration
# ===========================================
# Source-based deployment configuration
# Alternative to Dockerfile-based deployment
# ===========================================

version: 1.0
# App Runner supports nodejs22, nodejs18 (not nodejs20)
runtime: nodejs18

build:
  commands:
    pre-build:
      - npm ci --include=dev
    build:
      - npm run build

run:
  # Start the Express server
  command: node dist/index.js
  network:
    port: 5000
    env: PORT
  env:
    - name: NODE_ENV
      value: production

# Health check configuration
# App Runner will use /api/health endpoint
health:
  path: /api/health
  interval: 30
  timeout: 5
  healthy_threshold: 1
  unhealthy_threshold: 5
